openapi: 3.1.0
info:
  title: Gugu Admin API
  version: 0.1.0
  description: |
    SKU 적재, 가격 갱신, AliExpress 토큰 관리를 위한 어드민 배치 API 명세
servers:
  - url: https://lees-admin.duckdns.org
    description: 운영 서버
  - url: http://localhost:8700
    description: 로컬 개발 서버
tags:
  - name: system
    description: 시스템 엔드포인트
  - name: batch
    description: 어드민 배치 엔드포인트
  - name: token
    description: AliExpress OAuth 토큰 관리
paths:
  /health:
    get:
      tags:
        - system
      summary: 헬스 체크
      operationId: healthCheck
      responses:
        '200':
          description: 서버 정상 동작 중
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/batch/load-hot-products:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
      summary: 인기 상품 적재
      description: |
        AliExpress 인기 상품을 조회하여 hot_product, product 테이블에 적재합니다.
        이미 존재하는 상품은 product insert를 건너뜁니다. SKU는 별도 enrich-skus 엔드포인트로 적재합니다.
      operationId: loadHotProducts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotProductLoadRequest'
      responses:
        '202':
          description: 인기 상품 적재 작업 시작됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedMessageResponse'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/enrich-skus/hot-products:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
      summary: 인기 상품 SKU 보강
      description: SKU가 없는 인기 상품에 대해 Dropshipping API로 SKU를 적재합니다.
      operationId: enrichHotProducts
      responses:
        '202':
          description: SKU 보강 작업 시작됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedMessageResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/enrich-skus/all:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
      summary: 전체 상품 SKU 보강
      description: 모든 상품에 대해 Dropshipping API로 SKU를 적재합니다.
      operationId: enrichAllProducts
      responses:
        '202':
          description: SKU 보강 작업 시작됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedMessageResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/update-prices:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
      summary: 가격 갱신 배치
      description: |
        대상 상품들의 가격을 AliExpress API에서 다시 조회하여 갱신합니다.
        KRW, USD 각각 조회하여 price_history와 snapshot을 기록합니다.
        대표 통화(product.currency)인 경우에만 product 테이블의 current_price를 업데이트합니다.
      operationId: updatePrices
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceUpdateRequest'
            examples:
              allProducts:
                summary: 전체 상품 대상
                value: {}
              hotProductsOnly:
                summary: 인기 상품만
                value:
                  collection_source: HOT_PRODUCT_QUERY
                  requested_by: admin
              filteredByMarket:
                summary: 특정 시각 이전 수집된 AliExpress 상품
                value:
                  market: ALIEXPRESS
                  collected_before: '2026-04-01T00:00:00Z'
      responses:
        '202':
          description: 가격 갱신 배치 시작됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceUpdateAcceptedResponse'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 프리뷰 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/status:
    get:
      tags:
        - batch
      security:
        - AdminApiKey: []
      summary: 배치 상태 조회
      description: 최근 실행된 배치 작업의 상태를 반환합니다.
      operationId: getBatchStatus
      parameters:
        - in: query
          name: job_type
          required: false
          schema:
            type: string
            enum:
              - PRICE_UPDATE
      responses:
        '200':
          description: 배치 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '400':
          description: 잘못된 작업 유형
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/token/generate:
    post:
      tags:
        - token
      security:
        - AdminApiKey: []
      summary: OAuth 코드로 토큰 발급
      description: |
        AliExpress 셀러 인증 콜백에서 받은 OAuth 코드를 access/refresh 토큰으로 교환합니다.
        발급된 토큰은 DB에 저장됩니다.
      operationId: generateToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenGenerateRequest'
            examples:
              affiliate:
                summary: Affiliate 토큰 발급
                value:
                  code: '3_500102_JxZ05Ux3cnnSSUm6dCxYg6Q26'
                  app_type: AFFILIATE
              dropshipping:
                summary: Dropshipping 토큰 발급
                value:
                  code: '3_500102_abc123'
                  app_type: DROPSHIPPING
      responses:
        '200':
          description: 토큰 발급 및 저장 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResultResponse'
        '400':
          description: 잘못된 요청 또는 미지원 app_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 토큰 발급 또는 저장 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/oauth/authorize-url:
    get:
      tags:
        - token
      security:
        - AdminApiKey: []
      summary: OAuth 인가 URL 생성
      description: |
        지정한 app_type에 대해 AliExpress seller authorization URL을 생성합니다.
        반환된 URL로 이동하면 callback 엔드포인트에서 code를 내부적으로 받아 바로 토큰을 저장합니다.
      operationId: getAliExpressAuthorizeUrl
      parameters:
        - in: query
          name: app_type
          required: true
          schema:
            type: string
            enum:
              - AFFILIATE
              - DROPSHIPPING
      responses:
        '200':
          description: 인가 URL 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          description: 잘못된 앱 유형
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/oauth/callback/affiliate:
    get:
      tags:
        - token
      summary: Affiliate OAuth callback
      description: AliExpress Affiliate 앱 authorization code를 받아 내부 토큰 저장까지 수행합니다.
      operationId: aliexpressAffiliateCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 토큰 저장 성공
        '400':
          description: code 누락 또는 잘못된 요청
        '500':
          description: 토큰 저장 실패
  /v1/aliexpress/oauth/callback/dropshipping:
    get:
      tags:
        - token
      summary: Dropshipping OAuth callback
      description: AliExpress Dropshipping 앱 authorization code를 받아 내부 토큰 저장까지 수행합니다.
      operationId: aliexpressDropshippingCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 토큰 저장 성공
        '400':
          description: code 누락 또는 잘못된 요청
        '500':
          description: 토큰 저장 실패
  /v1/aliexpress/token/refresh:
    post:
      tags:
        - token
      security:
        - AdminApiKey: []
      summary: 토큰 수동 갱신
      description: |
        저장된 refresh_token을 사용하여 access_token을 갱신합니다.
        `app_type`을 지정하면 해당 앱만 갱신하고, 생략하면 AFFILIATE/DROPSHIPPING 둘 다 점검합니다.
        보통 스케줄러가 자동으로 처리하지만 수동 트리거도 가능합니다.
      operationId: refreshToken
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
            examples:
              affiliate:
                summary: Affiliate 토큰 갱신
                value:
                  app_type: AFFILIATE
              allTypes:
                summary: 모든 앱 토큰 점검
                value: {}
      responses:
        '200':
          description: 토큰 갱신 및 저장 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResultResponse'
        '400':
          description: 잘못된 요청 또는 미지원 app_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 해당 app_type의 토큰이 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 토큰 갱신 또는 저장 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/token/status:
    get:
      tags:
        - token
      security:
        - AdminApiKey: []
      summary: 토큰 상태 조회
      description: |
        저장된 토큰의 현재 상태를 반환합니다.
        app_type 파라미터 없이 호출하면 전체 앱 유형의 상태를 반환합니다.
      operationId: getTokenStatus
      parameters:
        - in: query
          name: app_type
          required: false
          schema:
            type: string
            enum:
              - AFFILIATE
              - DROPSHIPPING
      responses:
        '200':
          description: 토큰 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenStatusResponse'
        '500':
          description: 토큰 조회 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/users:
    get:
      tags:
        - batch
      security:
        - AdminApiKey: []
      summary: 사용자 목록 조회
      operationId: listUsers
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
        - in: query
          name: plan
          required: false
          schema:
            type: string
            enum:
              - FREE
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - INACTIVE
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 사용자 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '500':
          description: 사용자 목록 조회 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 헤더 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-API-Key
      description: 모든 `/v1` 어드민 API 호출 시 필요한 헤더. 현재 구현은 값 검증 없이 헤더 존재 여부만 확인합니다.
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    APIResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success
        data:
          description: 성공 응답 데이터
        error:
          $ref: '#/components/schemas/ErrorPayload'
    ErrorPayload:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            status:
              type: string
              enum:
                - error
            error:
              $ref: '#/components/schemas/ErrorPayload'
    AcceptedMessageResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
    PriceUpdateRequest:
      type: object
      properties:
        collection_source:
          type: string
          description: 수집 경로 필터
          example: HOT_PRODUCT_QUERY
        market:
          type: string
          description: 마켓 필터
          enum:
            - ALIEXPRESS
            - COUPANG
        product_ids:
          type: array
          description: 특정 상품 ID 목록
          items:
            type: string
        collected_before:
          type: string
          description: 이 시각 이전에 수집된 상품만 대상
          format: date-time
        force:
          type: boolean
          description: 강제 갱신 여부
        requested_by:
          type: string
          description: 요청자
    HotProductLoadRequest:
      type: object
      properties:
        category_ids:
          type: array
          description: 카테고리 ID 목록
          items:
            type: string
        keywords:
          type: string
          description: 검색 키워드
        sort:
          type: string
          description: 정렬 기준
        min_sale_price:
          type: string
          description: 최소 가격
        max_sale_price:
          type: string
          description: 최대 가격
    HotProductLoadResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - requested_count
                - hot_product_saved
                - product_saved_count
                - skipped_count
              properties:
                requested_count:
                  type: integer
                  description: API에서 조회된 상품 수
                processed_pages:
                  type: integer
                  description: 처리된 페이지 수
                hot_product_saved:
                  type: integer
                  description: hot_product 테이블에 저장된 수
                product_saved_count:
                  type: integer
                  description: product 테이블에 신규 저장된 수
                skipped_count:
                  type: integer
                  description: 이미 존재하여 건너뛴 상품 수
    PriceUpdateAcceptedResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - message
                - job
              properties:
                message:
                  type: string
                job:
                  $ref: '#/components/schemas/BatchJobStatus'
    BatchStatusResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/BatchJobStatus'
                - type: object
                  properties:
                    job_type:
                      type: string
                    status:
                      type:
                        - string
                        - 'null'
    BatchJobStatus:
      type: object
      required:
        - job_type
        - status
        - trigger_type
        - filter
        - requested_at
        - total_count
        - success_count
        - fail_count
        - skipped_count
      properties:
        job_type:
          type: string
          enum:
            - PRICE_UPDATE
        status:
          type: string
          enum:
            - QUEUED
            - RUNNING
            - COMPLETED
            - FAILED
        trigger_type:
          type: string
          enum:
            - MANUAL
            - SCHEDULED
        filter:
          $ref: '#/components/schemas/PriceUpdateFilter'
        requested_at:
          type: string
          format: date-time
        started_at:
          type:
            - string
            - 'null'
          format: date-time
        finished_at:
          type:
            - string
            - 'null'
          format: date-time
        total_count:
          type: integer
        success_count:
          type: integer
        fail_count:
          type: integer
        skipped_count:
          type: integer
        last_error:
          type: string
    PriceUpdateFilter:
      type: object
      properties:
        collection_source:
          type: string
        market:
          type: string
          enum:
            - ALIEXPRESS
            - COUPANG
        product_ids:
          type: array
          items:
            type: string
        collected_before:
          type:
            - string
            - 'null'
          format: date-time
        force:
          type: boolean
    TokenGenerateRequest:
      type: object
      required:
        - code
        - app_type
      properties:
        code:
          type: string
          description: AliExpress 콜백에서 받은 OAuth 인증 코드
        app_type:
          type: string
          enum:
            - AFFILIATE
            - DROPSHIPPING
          description: 토큰을 발급할 AliExpress 앱 유형
    TokenRefreshRequest:
      type: object
      required:
        - app_type
      properties:
        app_type:
          type: string
          enum:
            - AFFILIATE
            - DROPSHIPPING
    TokenResultResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - seller_id
                - app_type
                - access_token_expires_at
              properties:
                seller_id:
                  type: string
                app_type:
                  type: string
                  enum:
                    - AFFILIATE
                    - DROPSHIPPING
                access_token_expires_at:
                  type: string
                  format: date-time
                refresh_token_expires_at:
                  type:
                    - string
                    - 'null'
                  format: date-time
    TokenStatusResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - tokens
              properties:
                tokens:
                  type: array
                  items:
                    $ref: '#/components/schemas/TokenStatusEntry'
    TokenStatusEntry:
      type: object
      required:
        - app_type
        - status
      properties:
        app_type:
          type: string
          enum:
            - AFFILIATE
            - DROPSHIPPING
        seller_id:
          type: string
        user_nick:
          type: string
        status:
          type: string
          description: "ACTIVE: 정상 / EXPIRING_SOON: 곧 만료 / EXPIRED: 만료됨 / NOT_FOUND: 토큰 없음"
          enum:
            - ACTIVE
            - EXPIRING_SOON
            - EXPIRED
            - NOT_FOUND
        access_token_expires_at:
          type: string
          format: date-time
